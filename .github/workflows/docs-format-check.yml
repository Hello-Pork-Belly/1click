name: docs-format-check
on:
  pull_request:
    paths:
      - "docs/SSOT/一键安装构思.md"
      - "docs/SSOT/一键安装流程机制.md"
      - "docs/SSOT/1click核心执行框架 + 必要文档.md"
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on extremely long lines or suspiciously low line count
        run: |
          set -euo pipefail
          files=(
            "docs/SSOT/一键安装构思.md"
            "docs/SSOT/一键安装流程机制.md"
            "docs/SSOT/1click核心执行框架 + 必要文档.md"
          )
          for f in "${files[@]}"; do
            echo "==> checking $f"
            test -f "$f"
            # 1) max line length gate (hard)
            maxlen="$(awk '{ if (length($0)>m) m=length($0) } END{ print m+0 }' "$f")"
            echo "max_line_length=$maxlen"
            if [ "$maxlen" -gt 2000 ]; then
              echo "FAIL: $f has a line longer than 2000 chars " \
                   "(max=$maxlen)"
              exit 1
            fi
            # 2) suspiciously low line count vs file size (hard)
            lines="$(wc -l < "$f" | tr -d ' ')"
            bytes="$(wc -c < "$f" | tr -d ' ')"
            echo "lines=$lines bytes=$bytes"
            if [ "$bytes" -gt 3000 ] && [ "$lines" -lt 20 ]; then
              echo "FAIL: $f is large but has too few lines " \
                   "(bytes=$bytes lines=$lines)"
              exit 1
            fi
          done
          echo "OK"
